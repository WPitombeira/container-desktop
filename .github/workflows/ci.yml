name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Check scripts
        run: |
          bash -n script/build_and_run.sh
          bash -n script/package_release.sh

      - name: Build
        run: swift build --jobs 1

      - name: Test
        run: swift test --jobs 1
